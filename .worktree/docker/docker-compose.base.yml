# Worktree web container — generic base compose
# All ${WT_*} vars come from .worktree.conf via .worktree/scripts/worktree-web.sh
# All ${WORKTREE_*} vars are derived per-branch by the script at runtime

services:
  web:
    container_name: ${WORKTREE_SLUG}-web
    build:
      context: ${WORKTREE_WEB_DIR}
    volumes:
      - ${WORKTREE_WEB_DIR}:/app
      - wt_node_modules:/app/node_modules
    ports:
      - "${WORKTREE_PORT}:3000"
    networks:
      - main_network

volumes:
  wt_node_modules:

networks:
  main_network:
    name: ${WT_NETWORK}
    external: true

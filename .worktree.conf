# Worktree web container configuration
# Sourced by .worktree/scripts/worktree-web.sh — all values required unless noted

WT_PROJECT_NAME="fullstack-skeleton"     # Compose project prefix
WT_DOMAIN="app.localhost"                # TLS proxy domain + URLs
WT_ISSUE_PATTERN="[A-Z]+-[0-9]+"        # Branch name regex for slug/port derivation
WT_PORT_BASE=10000                       # Port = base + issue number
WT_WEB_SUBDIR="app"                     # Next.js app subdir within worktree
WT_NETWORK="fullstack-skeleton_default"  # Main stack Docker network to join

# Optional (defaults shown)
# WT_NUXT_PORT=3000                      # Dev server port inside container
# WT_CERTS_DIR="${HOME}/.config/dev-proxy/certs"  # TLS certificate directory
